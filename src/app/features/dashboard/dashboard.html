<div class="app-shell">

  <aside class="sidebar">
    <h1>JDR</h1>

    <nav>
      <button>Personnage</button>
      <button>Inventaire</button>
      <button>Compétences</button>
    </nav>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <span>Bienvenue {{ profile?.username }}</span>
      <button (click)="logout()">Déconnexion</button>
    </header>

    <section class="dashboard-grid">

      <div class="panel character-panel">
        <h2>Mon personnage</h2>

        @for (character of characters; track character.id) {
          <h3>{{ character.name }}</h3>
          <p>{{ character.role }}</p>
          <p>PV : {{ character.hp }} / {{ character.max_hp }}</p>
          <img
            class="character-avatar"
            [src]="character.avatar_url || 'assets/images/characters/default.png'"
            [alt]="character.name"
          />
        }
      </div>

      <div class="panel inventory-panel">
        <h2>Inventaire</h2>
      </div>

      <div class="panel skills-panel">
        <h2>Compétences</h2>
      </div>

    </section>

  </main>

</div>
